generate_dashboards:
  name: Generate Dashboard YAML
  description: >
    Write Lovelace dashboard YAML files to /config/steam_dashboards/:
    one global dashboard + one per detected game.

force_refresh:
  name: Force Refresh
  description: >
    Trigger an immediate inventory + price refresh without waiting
    for the next scheduled interval.

set_buy_price:
  name: Set Buy Price
  description: >
    Set or remove the purchase price for an item in cs2_buy_prices.json.
    Set price to 0 or leave empty to remove the entry.
  fields:
    market_hash_name:
      name: Market Hash Name
      description: Exact Steam market name of the item (e.g. "AK-47 | Redline (Field-Tested)")
      required: true
      selector:
        text:
    price:
      name: Price
      description: Purchase price in the configured currency. Set to 0 to remove.
      required: false
      default: 0
      selector:
        number:
          min: 0
          max: 100000
          step: 0.01
          mode: box

run_import:
  name: Run Historical Import
  description: >
    Import historical Steam Market price data into HA long-term statistics.
    Requires a valid Steam session cookie (steamLoginSecure).
    The cookie is used only for fetching data and is never stored.
  fields:
    steam_cookie:
      name: Steam Cookie (steamLoginSecure)
      description: Value of the steamLoginSecure cookie from your browser.
      required: true
      selector:
        text:
          type: password
    import_start_date:
      name: Start date (ISO format)
      description: "Only import data from this date onwards. Format: YYYY-MM-DD."
      required: false
      selector:
        text:
    min_item_value:
      name: Minimum item value
      description: Skip items worth less than this amount. 0 = import all.
      required: false
      default: 0
      selector:
        number:
          min: 0
          max: 10000
          step: 0.01
          mode: box

watchlist_add:
  name: Add to Watchlist
  description: >
    Add or update an item in the price watchlist (cs2_watchlist.json).
    A sensor is created for the item and its price is fetched each cycle.
  fields:
    market_hash_name:
      name: Market Hash Name
      description: Exact Steam market name (e.g. "AWP | Dragon Lore (Factory New)")
      required: true
      selector:
        text:
    target_price:
      name: Target Price
      description: Alert threshold — item appears in "below target" section when price is at or below this value.
      required: false
      selector:
        number:
          min: 0
          max: 1000000
          step: 0.01
          mode: box
    note:
      name: Note
      description: Optional note (reason for watching, condition, etc.)
      required: false
      selector:
        text:
    appid:
      name: Steam App ID
      description: "Steam App ID (730 = CS2, 570 = Dota 2, 440 = TF2, etc.)"
      required: false
      default: 730
      selector:
        number:
          min: 1
          max: 2000000
          mode: box

watchlist_remove:
  name: Remove from Watchlist
  description: Remove an item from the price watchlist (cs2_watchlist.json).
  fields:
    market_hash_name:
      name: Market Hash Name
      description: Exact Steam market name to remove.
      required: true
      selector:
        text:
